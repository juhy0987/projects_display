name: CI (main)

# main 브랜치 머지 직후 회귀 확인용 sanity-check.
# PR 단위 빌드/테스트는 ci-quality.yml 이 담당하므로 여기서는 push 만 트리거한다.

on:
  push:
    branches: [main]

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run pytest
        run: uv run pytest
