<template id="text-block-template">
  <p class="notion-block notion-text"></p>
</template>

<template id="image-block-template">
  <figure class="notion-block notion-image-wrap">
    <!-- 이미지/플레이스홀더/편집 패널을 감싸는 래퍼 (action overlay 기준점) -->
    <div class="image-media-wrap">
      <img class="notion-image" alt="" loading="lazy" />
      <!-- 이미지 로드 상태일 때만 표시되는 액션 overlay -->
      <div class="image-actions" aria-label="이미지 액션" hidden>
        <button
          type="button"
          class="image-action-btn image-view-btn"
          aria-label="크게 보기"
        >크게 보기</button>
        <button
          type="button"
          class="image-action-btn image-more-btn"
          aria-label="더보기"
          aria-expanded="false"
          aria-haspopup="menu"
        >···</button>
        <!-- 더보기 드롭다운 메뉴 -->
        <ul class="image-more-menu" role="menu" hidden>
          <li role="none">
            <button type="button" class="image-menu-item" data-action="change-image" role="menuitem">
              이미지 변경
            </button>
          </li>
          <li role="none">
            <button type="button" class="image-menu-item" data-action="edit-caption" role="menuitem">
              캡션 편집
            </button>
          </li>
          <li role="none">
            <button type="button" class="image-menu-item image-menu-item--danger" data-action="delete" role="menuitem">
              삭제
            </button>
          </li>
        </ul>
      </div>
    </div>
    <figcaption class="notion-caption" data-placeholder="캡션 추가..."></figcaption>
  </figure>
</template>


<template id="page-block-template">
  <button type="button" class="notion-block notion-page">
    <span class="page-block-icon" aria-hidden="true">⤷</span>
    <span class="page-block-title"></span>
  </button>
</template>

<template id="divider-block-template">
  <hr class="notion-block notion-divider" />
</template>

<template id="toggle-block-template">
  <div class="notion-block notion-toggle">
    <div class="toggle-header">
      <button type="button" class="toggle-arrow-btn" aria-label="토글 열기/닫기" aria-expanded="false">▶</button>
      <p class="toggle-title" tabindex="0"></p>
    </div>
    <div class="toggle-children" data-block-children hidden></div>
  </div>
</template>

<template id="quote-block-template">
  <blockquote class="notion-block notion-quote">
    <p class="quote-text"></p>
    <div class="quote-children" data-block-children></div>
  </blockquote>
</template>

<template id="code-block-template">
  <div class="notion-block notion-code">
    <div class="code-header">
      <select class="code-language-select"></select>
      <button type="button" class="code-copy-btn">복사</button>
    </div>
    <pre class="code-body"><code class="code-content" spellcheck="false"></code></pre>
    <!-- Mermaid 전용 패널: language=mermaid 일 때만 표시 -->
    <div class="mermaid-panel" hidden>
      <!-- 미리보기 래퍼: 액션 overlay의 position 기준점 -->
      <div class="mermaid-media-wrap" hidden>
        <div class="mermaid-preview" aria-label="Mermaid 다이어그램 미리보기"></div>
        <!-- 렌더 성공 시 프리뷰 우상단에 표시되는 액션 버튼 -->
        <div class="mermaid-actions" aria-label="다이어그램 액션" hidden>
          <button
            type="button"
            class="image-action-btn mermaid-view-btn"
            aria-label="크게 보기"
          >크게 보기</button>
          <button
            type="button"
            class="image-action-btn mermaid-download-btn"
            aria-label="다운로드"
          >다운로드</button>
        </div>
      </div>
      <!-- 렌더 실패 시 표시: 오류 메시지 + 재시도 버튼 -->
      <div class="mermaid-error" role="alert" aria-live="polite" hidden>
        <span class="mermaid-error-msg"></span>
        <button type="button" class="mermaid-retry-btn">재시도</button>
      </div>
    </div>
  </div>
</template>

<template id="url-embed-block-template">
  <div class="notion-block notion-url-embed">
    <!-- 생성 직후: URL 입력 폼 (isNew=true 일 때만 자동 노출) -->
    <div class="url-embed-input-wrap" hidden>
      <span class="url-embed-input-icon" aria-hidden="true">🔗</span>
      <input type="text" class="url-embed-input" placeholder="URL을 붙여넣으세요...">
    </div>
    <!-- error: 에러 메시지 (입력 폼 위에 표시) -->
    <div class="url-embed-error" hidden>
      <span class="url-embed-error-msg"></span>
      <button type="button" class="url-embed-retry-btn">재시도</button>
    </div>
    <!-- pending(기존 블록) / 빈 상태: 편집 유도 placeholder -->
    <div class="url-embed-placeholder" hidden>
      <span class="url-embed-placeholder-icon" aria-hidden="true">🔗</span>
      <span class="url-embed-placeholder-text">URL 임베드</span>
      <button type="button" class="url-embed-placeholder-edit-btn" aria-label="URL 입력">✎ URL 입력</button>
    </div>
    <!-- success: 북마크 카드 -->
    <div class="url-embed-card-wrap" hidden>
      <a class="url-embed-card" href="#" target="_blank" rel="noopener noreferrer">
        <div class="url-embed-info">
          <div class="url-embed-title"></div>
          <div class="url-embed-description"></div>
          <div class="url-embed-provider"></div>
        </div>
        <img class="url-embed-logo" alt="" loading="lazy" hidden>
      </a>
      <button type="button" class="url-embed-edit-btn" aria-label="URL 변경">✎</button>
    </div>
  </div>
</template>

<template id="file-block-template">
  <div class="notion-block notion-file">
    <!-- 빈 상태: 드래그&드롭 / 클릭 업로드 유도 -->
    <div class="file-empty-state">
      <div class="file-drop-zone" role="button" tabindex="0" aria-label="파일 업로드. 클릭하거나 파일을 드래그하세요.">
        <span class="file-drop-icon" aria-hidden="true">📎</span>
        <span class="file-drop-label">파일을 드래그하거나 클릭해서 업로드</span>
        <!-- type="file" input은 JS가 트리거 — 직접 클릭 금지(tabindex=-1) -->
        <input type="file" class="file-input" tabindex="-1" aria-hidden="true">
      </div>
      <div class="file-upload-error" role="alert" hidden></div>
    </div>
    <!-- 업로드 중 -->
    <div class="file-upload-spinner" hidden aria-live="polite" aria-label="업로드 중">
      <span class="file-spinner-dot" aria-hidden="true"></span>
      <span>업로드 중...</span>
    </div>
    <!-- 업로드 완료 상태: 파일 카드 -->
    <div class="file-uploaded-state" hidden>
      <div class="file-card">
        <span class="file-icon" aria-hidden="true">📎</span>
        <div class="file-info">
          <span class="file-name"></span>
          <span class="file-meta"></span>
        </div>
        <a class="file-download-btn" href="#" download aria-label="파일 다운로드">
          <span aria-hidden="true">↓</span> 다운로드
        </a>
        <button type="button" class="file-remove-btn" aria-label="파일 제거">✕</button>
      </div>
    </div>
  </div>
</template>

<template id="callout-block-template">
  <div class="notion-block notion-callout">
    <span class="callout-emoji"></span>
    <div class="callout-body">
      <p class="callout-text"></p>
      <div class="callout-children" data-block-children></div>
    </div>
  </div>
</template>
