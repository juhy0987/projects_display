<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=SUIT:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/atom-one-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>
  <!-- Mermaid.js: 클라이언트 사이드 다이어그램 렌더링 (Ref: https://mermaid.js.org/config/usage.html) -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>
    // startOnLoad: false — 자동 렌더링 비활성화, 코드 블록에서 명시적으로 호출
    // securityLevel: "sandbox" — XSS 방지를 위해 sandboxed iframe 사용
    document.addEventListener("DOMContentLoaded", () => {
      if (window.mermaid) {
        window.mermaid.initialize({ startOnLoad: false, securityLevel: "sandbox" });
      }
    });
  </script>
  {% block head %}{% endblock %}
</head>
<body>
  <div class="ambient-layer"></div>
  <div class="app-shell">
    {% block sidebar %}{% endblock %}
    <div class="main-area">
      {% block content %}{% endblock %}
    </div>
  </div>

  {% block templates %}{% endblock %}

  {% block scripts %}{% endblock %}
</body>
</html>
