<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=SUIT:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="ambient-layer"></div>
  <header class="topbar">
    <p class="eyebrow">Project Manager</p>
    <h1>Block-based Project Manager</h1>
    <p class="subcopy">텍스트, 이미지, 컨테이너 블록을 조합해 노션처럼 프로젝트 페이지를 구성합니다.</p>
  </header>

  <main class="page-shell">
    <aside class="document-list-panel">
      <h2>Documents</h2>
      <ul id="document-list" class="document-list" aria-label="document list"></ul>
    </aside>

    <section class="block-page" aria-live="polite">
      <header class="block-page-header">
        <h2 id="page-title"></h2>
        <p id="page-subtitle"></p>
      </header>
      <div id="block-root" class="block-root"></div>
    </section>
  </main>

  <template id="text-block-template">
    <p class="notion-block notion-text"></p>
  </template>

  <template id="image-block-template">
    <figure class="notion-block notion-image-wrap">
      <img class="notion-image" alt="block image" loading="lazy" />
      <figcaption class="notion-caption"></figcaption>
    </figure>
  </template>

  <template id="container-block-template">
    <section class="notion-block notion-container">
      <header class="container-title"></header>
      <div class="container-children"></div>
    </section>
  </template>

  <script src="/static/js/gallery.js" defer></script>
</body>
</html>
