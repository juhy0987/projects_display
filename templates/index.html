{% extends "base.html" %}

{% block content %}
<main class="page-shell">
  <aside class="document-list-panel">
    <div class="document-list-header">
      <h2>Documents</h2>
      <button id="new-document-btn" type="button" class="new-document-btn">+ 새 문서</button>
    </div>
    <ul id="document-list" class="document-list" aria-label="document list"></ul>
  </aside>

  <section class="block-page" aria-live="polite">
    <header class="block-page-header">
      <h2 id="page-title"></h2>
      <p id="page-subtitle"></p>
    </header>
    <div id="block-root" class="block-root"></div>
  </section>
</main>
{% endblock %}

{% block templates %}
{% include "partials/block_templates.html" %}
{% endblock %}

{% block scripts %}
<script src="/static/js/gallery.js" defer></script>
{% endblock %}
