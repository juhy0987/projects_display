{% extends "base.html" %}

{% block sidebar %}
<div id="sidebar-tab" class="sidebar-tab" role="button" tabindex="0" aria-label="사이드바 토글" aria-expanded="true" aria-controls="sidebar-panel">
  <span class="sidebar-tab-chevron"></span>
  <span class="sidebar-tab-label">문서</span>
</div>
<aside id="sidebar-panel" class="sidebar">
  <div class="sidebar-brand">
    <p class="eyebrow">Project Manager</p>
  </div>
  <div class="document-list-header">
    <h2>Documents</h2>
    <button id="new-document-btn" type="button" class="new-document-btn">+ 새 문서</button>
    <button id="notion-import-btn" type="button" class="notion-import-btn" title="Notion Import">&#8615; Import</button>
  </div>
  <ul id="document-list" class="document-list" aria-label="document list"></ul>
</aside>
{% endblock %}

{% block content %}
<div class="block-page-cover"></div>
<section class="block-page" aria-live="polite">
  <header class="block-page-header">
    <h1 id="page-title"></h1>
    <p id="page-subtitle"></p>
  </header>
  <div id="page-properties" class="page-properties" hidden></div>
  <div id="block-root" class="block-root"></div>
</section>
{% endblock %}

{% block templates %}
{% include "partials/block_templates.html" %}
{% endblock %}

{% block scripts %}
<script type="module" src="/static/js/main.js"></script>
{% endblock %}
